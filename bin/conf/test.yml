class:
  # 对应 g_person (单个 Person 对象)
  person:
    name: "sylar"
    age: 18
    sex: true

  # 对应 g_person_map (std::map<std::string, Person>)
  map:
    person_a:
      name: "alice"
      age: 22
      sex: false
    person_b:
      name: "bob"
      age: 25
      sex: true

  # 对应 g_person_vec_map (std::map<std::string, std::vector<Person>>)
  vec_map:
    group_1:
      - name: "charlie"
        age: 30
        sex: true
      - name: "diana"
        age: 28
        sex: false
    group_2:
      - name: "eve"
        age: 35
        sex: false